<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeSite</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- NAVBAR -->
  <header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold">RecipeSite</h1>

      <!-- Desktop Menu -->
      <nav class="hidden md:flex space-x-6">
        <a href="./index.html" class="hover:text-amber-800">Home</a>
        <a href="#" class="hover:text-amber-800">Recipes</a>
        <a href="#" class="hover:text-amber-800">About</a>
      </nav>

      <!-- Mobile Toggle -->
      <button id="menuBtn" class="md:hidden text-2xl">☰</button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden px-4 pb-4 space-y-2">
      <a href="./index.html" class="block">Home</a>
      <a href="#" class="block">Recipes</a>
      <a href="#" class="block">About</a>
    </div>
  </header>

  <!-- HERO SEARCH -->
  <section class="max-w-4xl mx-auto px-4 py-10 text-center">
    <h2 class="text-3xl font-semibold mb-4">Find Your Next Favorite Meal</h2>
    <div class="flex gap-2 justify-center">
      <input id="searchInput" type="text" placeholder="Search recipes..."
        class="w-full max-w-md px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-400" />
      <button id="searchBtn"
        class="bg-brown-500 text-white px-6 py-2 rounded-lg hover:bg-amber-800">
        Search
      </button>
    </div>
  </section>

  <!-- RECIPES LIST -->
  <main class="max-w-6xl mx-auto px-4 pb-16">
    <div id="recipesContainer" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <footer class="bg-white border-t py-6 text-center text-sm text-gray-500">
    © 2026 Godsfavour Prince
  </footer>

  <!-- LINK TO JS -->
  <script src="./script.js/app.js"></script>
</body>
</html>
